---
- name: upload package on cvmfs
  hosts: cvmfs
  become: true
  tasks:

    - name: Create a virtualenv and install swift cli        
      pip:
        name: [ "setuptools_rust","python-openstackclient","python-swiftclient" ]
        virtualenv: /tmp/swift_venv
        virtualenv_command: python3 -m venv

    - name: Download container in the cvmfs buffer
      shell: /tmp/swift_venv/bin/swift download --os-auth-token '{{ os_token }}' --os-storage-url '{{ os_storage_url }}' galaxy_flavors
      args:
        executable: /bin/bash
        chdir: /buffer

    - name: Save downloaded package in a variable to clean after
      shell: echo galaxy-express*
      args:
        executable: /bin/bash
        chdir: /buffer
      register: package 
    
    - debug:
        msg: '{{ package }}'

    - name: Open cvmfs transaction
      shell: cvmfs_server transaction tools.elixir-italy-cvmfs
      args:
        executable: /bin/bash
        chdir: /buffer

    - name: Check if target directories already exist
      stat:
        path: "/cvmfs/tools.elixir-italy-cvmfs/dump/{{ item }}"
      loop: "{{ package.stdout.split() }}"
      register: target_dirs

    - name: Report skipped directories
      debug:
        msg: "Skip {{ item.item }}: already exists in destination"
      loop: "{{ target_dirs.results }}"
      when: item.stat.exists

    - name: Move only directories that do not already exist
      command: mv "{{ item.item }}" /cvmfs/tools.elixir-italy-cvmfs/dump/
      loop: "{{ target_dirs.results }}"
      when: not item.stat.exists

    #- name: Move package from cvmfs buffer to cvmfs
    #  shell: mv -f {{ package.stdout }} /cvmfs/tools.elixir-italy-cvmfs/dump/
    #  args:
    #    executable: /bin/bash
    #    chdir: /buffer
    
    - name: CVMFS publish
      shell: cvmfs_server publish tools.elixir-italy-cvmfs
      args:
        executable: /bin/bash
        chdir: /buffer
    
